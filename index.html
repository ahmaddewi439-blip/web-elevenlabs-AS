<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web TTS Ahmad</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 15px; padding: 10px; font-size: 15px; }
        select { width: 100%; margin-bottom: 15px; padding: 10px; font-size: 16px; cursor: pointer; }
        button { padding: 12px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Ubah Teks Menjadi Suara (ElevenLabs)</h2>
    
    <textarea id="textInput" placeholder="Ketik sesuatu di sini (contoh: Tas lucu tapi fungsional? Cek keranjang kuning sekarang!)"></textarea>
    
    <select id="voiceSelect">
        <option value="21m00Tcm4TlvDq8ikWAM">Rachel (Wanita - Natural & Lembut)</option>
        <option value="pNInz6obpgDQGcFmaJcg">Adam (Pria - Berat & Tegas)</option>
        <option value="EXAVITQu4vr4xnSDxMaL">Bella (Wanita - Santai & Ekspresif)</option>
    </select>

    <button onclick="generateSpeech()" id="btnGenerate">Generate Suara</button>
    
    <div id="audioContainer"></div>

    <script>
        async function generateSpeech() {
            const text = document.getElementById('textInput').value;
            const selectedVoice = document.getElementById('voiceSelect').value;
            const btn = document.getElementById('btnGenerate');
            const container = document.getElementById('audioContainer');
            
            if (!text) return alert("Silakan ketik teks terlebih dahulu!");

            btn.innerText = "Memproses Suara (Mohon Tunggu)...";
            btn.disabled = true;

            try {
                // Memanggil backend Python di Vercel
                const response = await fetch('/api/index.py', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Mengirim Teks DAN ID Suara sekaligus
                    body: JSON.stringify({ text: text, voice_id: selectedVoice })
                });

                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    container.innerHTML = `<audio controls src="${audioUrl}" autoplay></audio>`;
                } else {
                    const errorText = await response.text();
                    alert("Gagal menghasilkan suara: " + errorText);
                }
            } catch (error) {
                alert("Terjadi kesalahan jaringan atau server.");
            }

            btn.innerText = "Generate Suara";
            btn.disabled = false;
        }
    </script>
</body>
</html>
