<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TTS Generator</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }

        .title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .status {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">🎤 TTS Generator</div>

    <textarea id="text" placeholder="Tulis teks di sini..."></textarea>

    <button onclick="generate()">Generate Suara</button>

    <div class="status" id="status"></div>

    <audio id="audio" controls></audio>
</div>

<script>
async function generate() {
    const text = document.getElementById("text").value;
    const status = document.getElementById("status");
    const audio = document.getElementById("audio");

    if (!text) {
        alert("Teks tidak boleh kosong!");
        return;
    }

    status.innerText = "Generating suara... 🔄";

    try {
        const res = await fetch("/api/generate-audio", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        if (!res.ok) {
            status.innerText = "Error ❌";
            return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);

        audio.src = url;
        audio.play();

        status.innerText = "Sukses ✅";
    } catch (err) {
        status.innerText = "Error koneksi ❌";
    }
}
</script>

</body>
</html>
